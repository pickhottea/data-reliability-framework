      rejected_rate: 0.0
      duplicate_rate: 0.0
      flagged_rate: 0.0

dimensions:
  operational_reliability:
    status: amber
    decision_note: >
      Operational reliability is materially unstable in the current cleaned snapshot.
      Failed runs substantially outnumber successful runs, and many runs carry non-zero
      error_count. The dominant hotspot is build_silver_table.
    supporting_metrics:
      - "valid run rows = 43"
      - "failed runs = 30"
      - "success runs = 12"
      - "runs with non-zero error_count = 40"
      - "top failed step = build_silver_table (5)"
    governance_implication:
      - "Retain Smart City as a governed pilot domain under active operational review."
      - "Do not characterize the domain as operationally stable."

  data_quality:
    status: green
    decision_note: >
      Quality evidence is strong in the current snapshot. All valid reviewed quality
      rows are pass, and average rejected, duplicate, and flagged rates are zero.
    supporting_metrics:
      - "valid quality rows = 5834"
      - "quality_status pass = 5834"
      - "avg pass_rate = 1.0"
      - "avg rejected_rate = 0.0"
      - "avg duplicate_rate = 0.0"
      - "avg flagged_rate = 0.0"
    governance_implication:
      - "Retain a positive quality posture in the scorecard."
      - "Continue to review quality separately from timeliness."

  freshness:
    status: red
    decision_note: >
      Freshness is currently outside acceptable governance tolerance. All valid
      reviewed freshness rows are stale, and lag values are extremely high.
    supporting_metrics:
      - "valid freshness rows = 8"
      - "stale rows = 8"
      - "avg freshness_lag_minutes = 409828.51"
      - "max freshness_lag_minutes = 638303.30"
    governance_implication:
      - "Retain a Red freshness exception."
      - "Do not allow timeliness risk to be masked by operational or quality positives."

  incident_and_exception_management:
    status: amber_red
    decision_note: >
      All valid cleaned error rows are critical and non-retryable. Repeated failures
      are clustered across Silver, Gold dependency handling, and telemetry metrics generation.
    supporting_metrics:
      - "valid error rows = 11"
      - "critical non-retryable errors = 11"
      - "AnalysisException = 6"
      - "build_silver_table = 5"
      - "build_telemetry_metrics = 3"
      - "build_gold_hourly_table = 3"
    governance_implication:
      - "Keep active exception tracking in place."
      - "Escalate recurring critical failures as incident candidates when needed."

  evidence_integrity:
    status: amber
    decision_note: >
      The analysis successfully filtered malformed rows, but evidence normalization
      remains necessary because invalid run and error rows are still materially present.
    supporting_metrics:
      - "filtered invalid run rows = 65"
      - "filtered invalid error rows = 66"
    governance_implication:
      - "Use cleaned metrics for governance interpretation."
      - "Improve telemetry-derived CSV integrity before stronger executive reporting."

