      build_telemetry_metrics: 3
      build_gold_hourly_table: 3
    by_error_type:
      AnalysisException: 6
      ValueError: 2
      NameError: 2
      DateTimeException: 1
    severity_retryable:
      critical_false: 11
    top_step_error_pairs:
      build_gold_hourly_table_AnalysisException: 3
      build_telemetry_metrics_AnalysisException: 2
      build_silver_table_ValueError: 2
      build_silver_table_NameError: 2
      build_telemetry_metrics_DateTimeException: 1
