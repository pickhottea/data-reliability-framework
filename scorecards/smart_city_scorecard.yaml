domain_id: smart_city
domain_name: smart_city_air_quality
scorecard_version: v1
status_date: 2026-04-11
scope: pilot
evidence_root: evidence/smart-city

evidence_sources:
  pipeline_run_log:
    path: evidence/smart-city/pipeline_run_log.csv
    grain: run
    columns:
      - run_id
      - trace_id
      - pipeline_name
      - started_at
      - finished_at
      - duration_ms
      - status
      - rows_in
      - rows_out
      - rows_flagged
      - rows_rejected
      - error_count
      - artifact_path
      - error_message

  quality_metrics_daily:
    path: evidence/smart-city/quality_metrics_daily.csv
    grain: metric_date_city_pollutant
    columns:
      - metric_date
      - run_id
      - city
      - pollutant
      - total_records
      - null_rate
      - duplicate_rate
      - stale_rate
      - outlier_rate
      - flagged_rate
      - rejected_rate
      - pass_rate
      - quality_status

  freshness_metrics:
    path: evidence/smart-city/freshness_metrics.csv
    grain: metric_ts_city_pollutant
    columns:
      - metric_ts
      - run_id
      - city
      - pollutant
      - latest_observed_at
      - latest_ingested_at
      - freshness_lag_minutes
      - freshness_status

  error_log:
    path: evidence/smart-city/error_log.csv
    grain: error_event
    columns:
      - error_ts
      - run_id
      - trace_id
      - span_id
      - pipeline_name
      - step_name
      - city
      - pollutant
      - batch_month
      - source_name
      - error_type
      - error_message
      - retryable
      - severity

  runtime:
    path: evidence/smart-city/runtime
    files:
      - run_events.jsonl
      - span_events.jsonl
      - metric_events.jsonl
      - error_events.jsonl

overall_status:
  current: amber
  rationale:
    - "The domain now emits governance-usable telemetry, quality, freshness, and error evidence."
    - "Operational failures are present in run-level evidence."
    - "Freshness evidence shows stale conditions and very large lag values in the reviewed sample."
    - "Quality rows sampled look healthy, but full-period aggregation is still required."

dimensions:
  operational_reliability:
    objective: Pipeline runs successfully and completes expected processing stages.
    status: amber
    rationale:
      - "pipeline_run_log contains failed runs."
      - "error_log contains critical errors."
    evidence:
      - pipeline_run_log
      - error_log
    indicators:
      run_status:
        source: pipeline_run_log.status
        rule:
          healthy_value: succeeded
          risk_value: failed
        interpretation:
          green: "No failed runs in the reporting window."
          amber: "At least one failed run in the reporting window."
          red: "Repeated failed runs or failure cluster in the reporting window."
      run_duration_ms:
        source: pipeline_run_log.duration_ms
        interpretation:
          green: "Runtime stable relative to recent runs."
          amber: "Runtime shows noticeable volatility or slowdown."
          red: "Runtime degradation materially affects pipeline reliability."
      run_error_count:
        source: pipeline_run_log.error_count
        interpretation:
          green: "0 errors recorded for the run."
          amber: "Non-zero errors recorded for isolated runs."
          red: "Repeated non-zero errors across runs."
      critical_error_presence:
        source: error_log.severity
        rule:
          risk_value: critical
        interpretation:
          green: "No critical errors present."
          amber: "Critical errors present but isolated."
          red: "Critical errors recurring or blocking core processing."

  data_quality:
    objective: Curated data remains usable and within expected quality tolerances.
    status: amber
    rationale:
      - "Sample rows in quality_metrics_daily look healthy."
      - "Final status should be confirmed by aggregate review, not samples alone."
    evidence:
      - quality_metrics_daily
    indicators:
      quality_status:
        source: quality_metrics_daily.quality_status
        rule:
          healthy_value: pass
          risk_value: fail
        interpretation:
          green: "All or nearly all reviewed rows are pass."
          amber: "Some fail states or quality deterioration observed."
          red: "Material and persistent fail states observed."
      pass_rate:
        source: quality_metrics_daily.pass_rate
        target: ">= 0.98"
        interpretation:
          green: "Pass rate meets or exceeds 0.98."
          amber: "Pass rate below 0.98 but above severe threshold."
          red: "Pass rate materially below acceptable tolerance."
      rejected_rate:
        source: quality_metrics_daily.rejected_rate
        target: "<= 0.02"
        interpretation:
          green: "Rejected rate at or below 0.02."
          amber: "Rejected rate above 0.02."
          red: "Rejected rate materially above 0.02 or worsening across days."
      duplicate_rate:
        source: quality_metrics_daily.duplicate_rate
        target: "<= 0.01"
        interpretation:
          green: "Duplicate rate at or below 0.01."
          amber: "Duplicate rate above 0.01."
          red: "Duplicate rate materially above 0.01 or recurring across cities/pollutants."
      null_rate:
        source: quality_metrics_daily.null_rate
        interpretation:
          green: "Null rate stable and near zero."
          amber: "Null rate elevated for some city/pollutant combinations."
          red: "Null rate materially affects usability."
      stale_rate:
        source: quality_metrics_daily.stale_rate
        interpretation:
          green: "No meaningful stale-rate signal in daily quality output."
          amber: "Stale-rate signal present in some segments."
          red: "Stale-rate broadly elevated."
      outlier_rate:
        source: quality_metrics_daily.outlier_rate
        interpretation:
          green: "Outlier rate within expected tolerance."
          amber: "Outlier rate elevated."
          red: "Outlier rate materially elevated or persistent."
      flagged_rate:
        source: quality_metrics_daily.flagged_rate
        interpretation:
          green: "Flagged rate stable and low."
          amber: "Flagged rate rising or elevated."
          red: "Flagged rate materially elevated and unresolved."

  freshness:
    objective: Data remains timely enough for downstream trust and use.
    status: red
    rationale:
      - "freshness_metrics sample rows show freshness_status = stale."
      - "freshness_lag_minutes values in the sample are extremely high."
    evidence:
      - freshness_metrics
    indicators:
      freshness_status:
        source: freshness_metrics.freshness_status
        rule:
          healthy_value: fresh
          risk_value: stale
        interpretation:
          green: "Rows are fresh or within acceptable tolerance."
          amber: "Some stale rows present."
          red: "Stale rows widespread or persistent."
      freshness_lag_minutes:
        source: freshness_metrics.freshness_lag_minutes
        target: "<= 1440"
        interpretation:
          green: "Lag is at or below 1440 minutes."
          amber: "Lag exceeds 1440 minutes."
          red: "Lag is materially above tolerance or persistent across reviewed rows."

  incident_and_exception_management:
    objective: Operational failures are visible, classifiable, and reviewable.
    status: amber
    rationale:
      - "error_log already provides severity and retryable fields."
      - "Exception workflow is now possible, but not yet fully operationalized."
    evidence:
      - error_log
      - runtime
    indicators:
      severity:
        source: error_log.severity
        interpretation:
          green: "No critical severity errors."
          amber: "Critical severity exists but appears isolated."
          red: "Critical severity errors recur or block pipeline operation."
      retryable:
        source: error_log.retryable
        interpretation:
          green: "Most errors are retryable or transient."
          amber: "Some non-retryable errors exist."
          red: "Critical non-retryable errors recur."
      error_type:
        source: error_log.error_type
        interpretation:
          green: "No recurring harmful pattern."
          amber: "Recurring error types require monitoring."
          red: "Recurring error types indicate unresolved systemic defect."
      step_name:
        source: error_log.step_name
        interpretation:
          green: "No stage repeatedly implicated."
          amber: "Some stages show repeated failure."
          red: "A core stage repeatedly fails and blocks reliability."

observed_sample_signals:
  pipeline_run_log:
    observed_status_values:
      - failed
    observed_notes:
      - "Sample failed runs exist."
      - "Observed messages include missing pollutant columns and Spark internal error output."

  quality_metrics_daily:
    observed_quality_status_values:
      - pass
    observed_notes:
      - "Sample rows show pass_rate = 1.0."
      - "Sample rows show null_rate, duplicate_rate, stale_rate, outlier_rate, flagged_rate, rejected_rate = 0.0."

  freshness_metrics:
    observed_freshness_status_values:
      - stale
    observed_notes:
      - "Sample rows show very high freshness_lag_minutes."
      - "Sample rows are marked stale."

  error_log:
    observed_error_types:
      - AnalysisException
      - ValueError
    observed_severity_values:
      - critical
    observed_retryable_values:
      - false
    observed_notes:
      - "Sample rows include unresolved-column failure."
      - "Sample rows include missing pollutant-column failure."

review_actions:
  immediate:
    - "Aggregate pipeline_run_log by status to compute run success rate."
    - "Aggregate quality_metrics_daily by metric_date to compute daily pass and reject trends."
    - "Aggregate freshness_metrics by city and pollutant to identify worst stale segments."
    - "Group error_log by step_name, error_type, severity, and retryable."
  next:
    - "Populate observed values into this scorecard."
    - "Link exception rules directly to stale freshness, failed runs, and critical non-retryable errors."
    - "Prepare first monthly governance board pack."

owners:
  governance_owner: tbd
  technical_owner: tbd
  domain_owner: tbd

review_cycle:
  frequency: monthly
  current_phase: pilot
  next_review: tbd