  rationale:
    - "Operational failures materially exceed successful runs in the cleaned run snapshot."
    - "Freshness is currently a red-domain concern."
    - "Quality metrics are strong in the current evidence snapshot."
    - "Evidence normalization is still required for malformed run and error rows."

